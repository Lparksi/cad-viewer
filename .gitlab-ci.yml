stages:
  - ci
  - deploy
  - pages

variables:
  NODE_VERSION: "20"
  BUN_VERSION: "1.3.8"

# ----------------------
# CI Job
# ----------------------
ci:
  stage: ci
  image: node:20
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
      - .bun/install/cache/
  before_script:
    - curl -fsSL https://bun.sh/install | bash -s -- bun-v${BUN_VERSION}
    - export BUN_INSTALL="$HOME/.bun"
    - export PATH="$BUN_INSTALL/bin:$PATH"
  script:
    - bun install --frozen-lockfile
    - bun run lint
    - bun run build
    - bun run test
  rules:
    # Run on pushes to main
    - if: '$CI_COMMIT_BRANCH == "main"'
    # Run on merge requests
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ----------------------
# Deploy Job
# ----------------------
deploy:
  stage: deploy
  image: node:20
  dependencies:
    - ci
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
      - .bun/install/cache/
  before_script:
    - curl -fsSL https://bun.sh/install | bash -s -- bun-v${BUN_VERSION}
    - export BUN_INSTALL="$HOME/.bun"
    - export PATH="$BUN_INSTALL/bin:$PATH"
  script:
    - bun install --frozen-lockfile
    - bun run build
    - bun run doc
    - bun run pre-serve
    - mkdir -p public
    - cp -r ./packages/examples/public/* public/
  artifacts:
    paths:
      - public
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# ----------------------
# GitLab Pages Deployment
# ----------------------
pages:
  stage: pages
  variables:
    GIT_STRATEGY: none
  script:
    - echo "Deploying to GitLab Pages..."
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
